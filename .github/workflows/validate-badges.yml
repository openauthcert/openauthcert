name: validate-badges
permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'registry/**'
      - 'specs/badge-spec/**'
      - 'packages/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build core + CLI
        run: pnpm --filter @openauthcert/cli... build
      # The public key is committed (it is not secret) and is the single source
      # of truth for verification.
      - name: Validate registry (schema + signature + path consistency)
        run: node packages/cli/dist/cli.js validate --pub specs/badge-spec/public.pem
