name: revoke-on-fail

on:
  workflow_dispatch:
    inputs:
      badge_path:
        description: 'Badge JSON to revoke (e.g. registry/badge-registry/<vendor>/<application>/<version>.json)'
        required: true
      notes:
        description: 'Reason for revocation'
        required: false

permissions:
  contents: write

jobs:
  revoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build core + CLI
        run: pnpm --filter @openauthcert/cli... build
      - name: Write signing key
        run: printf '%s' "${{ secrets.OAC_PRIVATE_KEY_B64 }}" > "$RUNNER_TEMP/oac_seed.b64"
      - name: Revoke and re-sign
        env:
          BADGE_PATH: ${{ github.event.inputs.badge_path }}
          NOTES: ${{ github.event.inputs.notes }}
        run: |
          if [ -n "$NOTES" ]; then
            node packages/cli/dist/cli.js revoke "$BADGE_PATH" \
              --seed-b64 "@$RUNNER_TEMP/oac_seed.b64" --notes "$NOTES"
          else
            node packages/cli/dist/cli.js revoke "$BADGE_PATH" \
              --seed-b64 "@$RUNNER_TEMP/oac_seed.b64"
          fi
      - name: Verify revocation
        run: node packages/cli/dist/cli.js verify "${{ github.event.inputs.badge_path }}" --pub specs/badge-spec/public.pem
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add "${{ github.event.inputs.badge_path }}"
          git commit -m "Revoke badge ${{ github.event.inputs.badge_path }}"
          git push
