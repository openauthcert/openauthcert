name: deploy-website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'registry/**'
      - 'specs/**'
      - 'packages/core/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build core + CLI
        run: pnpm --filter @openauthcert/cli... build
      - name: Validate registry before publishing
        run: node packages/cli/dist/cli.js validate --pub specs/badge-spec/public.pem
      - name: Build site
        run: pnpm --filter openauthcert-site build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: website/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
