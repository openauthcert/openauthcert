name: probe-compliance

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Build core + CLI
        run: pnpm --filter @openauthcert/cli... build
      - name: Generate stub compliance evidence
        run: node packages/cli/dist/cli.js probe --registry registry/badge-registry --out registry/evidence
      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compliance-evidence
          path: registry/evidence
      - name: Summarize
        run: |
          echo "## Compliance summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Generated stub compliance results for certified badges." >> "$GITHUB_STEP_SUMMARY"
      - name: Commit evidence to evidence-data branch
        if: always()
        run: |
          git config user.name "oac-bot"
          git config user.email "bot@openauthcert.org"
          git checkout -B evidence-data
          git add registry/evidence || true
          git commit -m "evidence: $(date -u +%Y-%m-%dT%H:%M:%SZ)" || exit 0
          git push -f origin evidence-data
